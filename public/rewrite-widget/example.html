<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Rewrite Widget Example</title>
  <style>
    body{
      margin:0; min-height:100vh;
      display:grid; place-items:center;
      background: radial-gradient(1200px 600px at 50% 20%, #18253a 0%, #0b0f17 55%);
    }
    .stack { display:flex; flex-direction:column; gap:16px; }
  </style>
</head>
<body>
  <div class="stack">
    <div id="rw1"></div>
    <div id="rw2"></div>
  </div>

  <script src="/rewrite-widget/rewrite-widget.js"></script>
  <script>
    // OIDC-protected pages should use reloadOnLoginRequired: true for automatic auth recovery.
    // loginPageUrl is optional and only for manual sign-in flows
    // (reloadOnLoginRequired: false) on public/non-protected pages.
    RewriteWidget.mount({
      containerSelector: "#rw1",
      apiBase: "", // same-origin (recommended when hosted by the same server)
      title: "Rewrite Box 1",
      reloadOnLoginRequired: true
    });

    RewriteWidget.mount({
      containerSelector: "#rw2",
      apiBase: "",
      title: "Rewrite Box 2",
      reloadOnLoginRequired: true
    });
  </script>
</body>
</html>
