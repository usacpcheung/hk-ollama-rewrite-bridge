# -----------------------------------------------------------------------------
# Rewrite Bridge reverse-proxy + OIDC access-control snippet
#
# Usage:
# 1) Place this inside an HTTPS VirtualHost (:443) with mod_proxy and mod_auth_openidc enabled.
# 2) Replace ALL placeholder values (<...>) with real environment-specific values.
# 3) Keep OIDC client secret outside git; inject from secure secret management.
# -----------------------------------------------------------------------------

# --- OIDC provider client config (SENSITIVE: replace placeholders) ---
OIDCProviderMetadataURL <https://idp.example.com/.well-known/openid-configuration>
OIDCClientID <rewrite-bridge-client-id>
OIDCClientSecret <REPLACE_WITH_SECURE_SECRET>
OIDCRedirectURI <https://your-public-host.example.com/oidc/callback>
OIDCCryptoPassphrase <REPLACE_WITH_LONG_RANDOM_STRING>

# Optional but recommended hardening (adjust for your tenant)
OIDCScope "openid email profile"
OIDCRemoteUserClaim email

# Ensure Apache forwards trusted auth headers to backend only.
# server.js expects BOTH:
# - X-Authenticated-Email (validated as *@hs.edu.hk)
# - X-Bridge-Auth (must match BRIDGE_INTERNAL_AUTH_SECRET in backend env)
RequestHeader unset X-Authenticated-Email
RequestHeader unset X-Authenticated-User
RequestHeader unset X-Authenticated-Subject
RequestHeader unset X-Bridge-Auth
RequestHeader set X-Authenticated-Email "%{OIDC_CLAIM_email}e" env=OIDC_CLAIM_email
RequestHeader set X-Bridge-Auth "<REPLACE_WITH_STRONG_SHARED_SECRET>"

# Canonical public namespace for this service
ProxyPass /api/rewrite-bridge/rewrite http://127.0.0.1:3001/rewrite
ProxyPassReverse /api/rewrite-bridge/rewrite http://127.0.0.1:3001/rewrite
ProxyPass /api/rewrite-bridge/model-status http://127.0.0.1:3001/model-status
ProxyPassReverse /api/rewrite-bridge/model-status http://127.0.0.1:3001/model-status

# Health endpoints for monitoring and load balancers
# Place these inside your active VirtualHost and protect them with allowlist/auth.
ProxyPass /api/rewrite-bridge/healthz http://127.0.0.1:3001/healthz
ProxyPassReverse /api/rewrite-bridge/healthz http://127.0.0.1:3001/healthz
ProxyPass /api/rewrite-bridge/readyz http://127.0.0.1:3001/readyz
ProxyPassReverse /api/rewrite-bridge/readyz http://127.0.0.1:3001/readyz

# Enforce OIDC login for API namespace.
# If you need unauthenticated health checks, split healthz/readyz into a separate Location block.
<Location "/api/rewrite-bridge">
    AuthType openid-connect
    Require valid-user
</Location>

# Temporary legacy compatibility alias (deprecated)
# Remove in next breaking-release window after frontend migration to /api/rewrite-bridge/*.
ProxyPass /api/rewrite http://127.0.0.1:3001/rewrite
ProxyPassReverse /api/rewrite http://127.0.0.1:3001/rewrite

# Legacy alias protection for compatibility path
<Location "/api/rewrite">
    AuthType openid-connect
    Require valid-user
</Location>
